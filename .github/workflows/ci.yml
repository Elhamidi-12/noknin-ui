name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NokninUI.slnx

      - name: Build
        run: dotnet build NokninUI.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack src/NokninUI/NokninUI.csproj -c Release --no-build
